e Israeli startup (Nadav Noy, Noam Dotan); Cyera\u2019s 5th acquisition after Trail ($162M), Ryft (~$100M), Otterize, Shape AI. Catch-up item (missed in 5/29 run)."], ["2026-05-05", "Axur", "Infoblox (completed)", "", "AI external threat / digital risk protection", "Catch-up; surfaced in Infosecurity Mag 6/8 M&A roundup. Adds DRPS + Continuous Threat Exposure Mgmt to Infoblox Exposure Management."], ["2026-05-14", "Driftnet", "SecurityScorecard (completed)", "", "Threat intel for AI-driven TPRM", "Catch-up; surfaced 6/8 roundup. Combines Driftnet internet-discovery engine with SecurityScorecard TITAN AI platform."]]}, "Themes": {"headers": ["Theme", "Description", "Representative players", "Investment thesis", "Risks / open questions"], "rows": [["AI-SOC / Autonomous analyst", "LLM-powered agents that triage, enrich, and investigate alerts, replacing or augmenting Tier-1/2 analysts.", "Dropzone AI, Prophet, Radiant, Simbian, Crogl, Andesite, Seven.AI", "SOCs are understaffed, drowning in alerts; MSSPs are first adopters. Ride the shift from SOAR playbooks to reasoning agents.", "Commoditization risk as SIEM/EDR vendors ship native copilots (Microsoft Security Copilot, CrowdStrike Charlotte, Splunk AI)."], ["GenAI firewall / prompt security", "Inline guardrails for LLM apps: prompt injection, jailbreak, PII redaction, output policy enforcement.", "Lakera, Prompt Security, Apex, Pillar, Protect AI (PANW), Robust Intelligence (Cisco)", "Every enterprise GenAI rollout requires guardrails; fast TAM growth.", "Hyperscalers (AWS Bedrock Guardrails, Azure AI Content Safety) bundle basic protection; differentiation via policy + telemetry + model coverage."], ["AI red teaming / AI pentest", "Automated adversarial evaluation of models, agents, and full AI apps.", "Haize Labs, Grey Swan, Mindgard, SplxAI, XBOW, Repello", "Aligned with regulation (EU AI Act, NIST AI RMF) + enterprise need for pre-prod assurance.", "Often sold as services; productizing continuous testing at scale is hard."], ["Agentic AI security", "Runtime controls, policy, and identity for autonomous AI agents and tool use.", "Noma, Straiker, Invariant Labs, Conifers, Simbian, Token, Clutch", "Agent adoption is exploding; no mature security primitives yet. White-space akin to early container security.", "Category is pre-enterprise; definitions still fluid. Risk of overlap with NHI and GenAI firewall."], ["Non-human identity (NHI) / machine identity", "Discovery and governance of service accounts, API keys, service principals, and agents.", "Astrix, Oasis, Token, Clutch, Entro, Venafi (CyberArk)", "10-50x more NHIs than humans in cloud estates. Secret-sprawl incidents are on the rise (Internet Archive, Snowflake).", "Risk of being absorbed into IAM platforms (Okta, Microsoft Entra)."], ["Data security for AI (DSPM / AI-DLP)", "Discover, classify, and govern sensitive data flowing to AI systems.", "Cyera, Sentra, Normalyze, BigID, Cyberhaven, Harmonic, Securiti", "Boards care about data leakage to GenAI. Cyera's growth is the bull case.", "Commoditization by CNAPPs (Wiz, Orca). Differentiation via lineage and policy across SaaS."], ["AI governance / model risk", "Governance frameworks, AI-BOMs, policy, and audit trails aligned with EU AI Act / NIST RMF.", "Credo AI, Holistic AI, Cranium, Monitaur, Fiddler, Arthur", "Regulation-driven growth; procurement line-item in 2026 budgets.", "Low software margin; competes with GRC platforms and Big 4 services."], ["Deepfake / synthetic media defense", "Detection and provenance for AI-generated voice, image, and video.", "Adaptive, Reality Defender, GetReal, Clarity", "Vishing/deepfake-of-CFO incidents rising fast. BEC + KYC are growing wedges.", "Detection is an arms race; provenance (C2PA) may solve part of problem."], ["AI for code security", "LLMs to find, prioritize, and (critically) AUTO-FIX vulnerabilities in source code. The remediation sub-segment is its own race: deterministic-codemod approaches (Pixee, Mobb) vs. AI-native SAST + fix (Corgea, ZeroPath, Gecko, Almanax) vs. incumbent fix features bolted onto Snyk/Checkmarx/Veracode/GitHub.", "Semgrep, Socket, Endor Labs, Apiiro, Aikido, Corgea, Pixee, Mobb, ZeroPath, Gecko, Almanax, AquilaX, Ghost. Incumbent fix features: GitHub Copilot Autofix, Snyk Agent Fix / DeepCode AI, Veracode Fix, Checkmarx AI.", "Developers will adopt AppSec only when it is embedded in CI + IDE; GenAI makes this possible.", "(1) Incumbent gravity: GitHub Copilot Autofix is free for OSS and bundled with GHAS; Snyk Agent Fix is the default in many enterprises. (2) Trust ceiling on AI patches \u2014 merge rate, regressions, license/IP issues. (3) Fix quality is benchmark-able and could commoditize fast."], ["AI-native email & social engineering", "Behavioral detection of BEC, phishing, QR-phishing, deepfake voice calls, Slack/Teams abuse.", "Abnormal, Material, Adaptive, Tessian (now Proofpoint), StrongestLayer", "Abnormal's scale shows durable pricing power; attackers use LLMs to author phish at scale.", "Gmail/Microsoft 365 native defenses improving; AI-phish defense must span collab, voice, SMS."], ["AI-enabled GRC / compliance", "Policy-as-code, evidence collection, and continuous control monitoring with LLM summarization.", "Vanta, Drata, Secureframe, Anecdotes, Zenity (copilot GRC)", "SOC 2/ISO is table-stakes; AI expands to NIS2, EU AI Act, HIPAA.", "Crowded market; differentiation on AI quality and enterprise-grade workflows."], ["Cloud + runtime AI", "AI-based detection of cloud workloads and container runtime anomalies.", "Wiz, Orca, Upwind, Sweet, RAD, Kodem, Armo", "Runtime + eBPF + LLM reasoning is the next CNAPP wave.", "Consolidation risk: Wiz / Palo Alto / CrowdStrike are buying up this stack."], ["AI agent skill / tool marketplace security", "Inspection, signing, and runtime governance of agent skills, tools, and marketplace integrations \u2014 a new attack surface as MCP/Skill marketplaces explode.", "ThreatBook SafeSkill (5/7/2026), Astrix (post-Cisco), Capsule Security, emerging stealth co.", "MCP servers, agent skill packs, and tool marketplaces create a 2025\u20132026 era equivalent of the npm/pypi supply-chain problem. Buyers want pre-import inspection, marketplace policy, and inventory remediation. SecOps + AppSec budget overlap.", "Risk that agent platform vendors (Microsoft Agent 365, OpenAI, Anthropic) bundle native marketplace inspection. Differentiation: multi-vendor coverage, hybrid runtime, enterprise governance + audit."], ["Frontier-lab \"Trusted Access for Cyber\" tier", "Frontier AI labs ship special, less-restrictive variants of their flagship models to vetted defender teams (capability for vuln triage, malware analysis, exploit POC writing, simulations) under verified-access programs.", "OpenAI Trusted Access for Cyber + GPT-5.5-Cyber (5/7); Anthropic Claude Mythos Preview (4/30) + Project Glasswing consortium; CrowdStrike/PANW/SentinelOne/Trend/Wiz integrations.", "Defender side gets a 'capability uplift' channel matching offensive AI; vendors can build differentiated detection + IR products on top of these tiers; insurance & regulators may eventually mandate vetted-defender access.", "Capability-asymmetry risk if access is narrow; potential for liability/regulatory blowback (EU AI Act + DoD); platform lock-in across labs; non-trivial entitlement-management problem for SOCs spanning Anthropic + OpenAI + Google trust tiers."], ["Human risk security as a budget line", "AI-generated phishing, voice/video deepfakes, and personalized social engineering at scale force enterprises to treat humans as a first-class attack surface. New category replaces legacy security-awareness vendors with AI-vs-AI simulation + adaptive training.", "Frame Security (5/11/2026 stealth-exit $50M); Adaptive Security ($43M a16z + OpenAI Startup Fund); KnowBe4 (incumbent); Hoxhunt; Living Security; emerging stealth co.", "Buyers report 50-70% of breach root cause is human. AI defenses outside email gateway are inadequate; CFO voice-deepfake losses crossed $1.56B in 2025. Frame at $50M from Index validates buyer demand. Adjacent budget to BEC/AI-email and to GRC training.", "Risk: incumbents (KnowBe4, Proofpoint, Abnormal) bundle native AI simulation; \"human risk score\" is hard to externally benchmark. Differentiation requires role-personalization + multi-channel coverage + measurable behavior change."], ["Defender AI vulnerability discovery becomes table-stakes", "Frontier-lab and platform vendors ship branded \"AI finds and proves bugs\" capability. Microsoft MDASH (5/12) joins Anthropic Mythos and OpenAI GPT-5.5-Cyber. Each system orchestrates dozens-to-hundreds of specialized AI agents to find, validate, and exploit vulnerabilities pre-attacker.", "Microsoft MDASH (5/12 \u2014 16 Windows CVEs incl. 4 critical RCEs; 88.45% CyberGym); Anthropic Mythos Preview; OpenAI GPT-5.5-Cyber; XBOW ($75M Sequoia); Endor Labs AURI; Snyk + Claude integration; CrowdStrike, PANW, SentinelOne, TrendAI, Wiz integrating Opus 4.7.", "AI vulnerability discovery shifts from research demo (DARPA AIxCC, XBOW) to mainstream product capability. Microsoft using MDASH internally to break its own annual CVE record. Defenders catching up to offensive AI capability on the same systems. Vendors will need to either build native or bind to frontier-lab cyber tiers.", "Risk: capability concentration in 4-5 frontier labs + Microsoft. Liability for false-positive triage. Open-source equivalents (DefenseClaw, Rex) may compress proprietary moats. Enterprise entitlement management across multi-vendor cyber AI access still unsolved."], ["Sovereign / Compliant AI infrastructure", "Open-source, on-prem-friendly platforms for deploying AI/data-science workloads in regulated, air-gapped, or classified environments. Combines JupyterHub-class workbenches with built-in RBAC, SSO, reproducible envs, audit, and IaC so regulated buyers can stand up an AI dev stack without a hyperscaler-managed service.", "Anaconda Enterprise, Domino Data Lab, Determined AI (HPE), Saturn Cloud, Coiled, Run:AI (pre-NVIDIA); OSS: Nebari-dev (OpenTeams), Kubeflow, Open MLOps. (Note: OpenTeams' Nebari was originally added here in error \u2014 the 'Nebari' in the 2026 CrowdStrike accelerator is a different, stealth AI-product-security company by Guy Arazi.)", "Defense, biotech, finserv, EU/GCC public-sector cannot rely on SageMaker/Vertex/Databricks due to sovereignty, FedRAMP/IL-tier, HIPAA, ITAR/EAR, or data residency. CrowdStrike/AWS/NVIDIA accelerator inclusion of Nebari signals AI-infra-security is now sold INTO the security budget. Procurement increasingly involves CISO sign-off; platform teams want one stack across clouds + airgap.", "Thin software margins on OSS-led GTM; hyperscalers (Bedrock sovereign tiers, Vertex AI Confidential, Azure Sovereign Cloud) compete from above; Snowflake/Databricks compete from the data-platform side. Differentiation = airgap-credible deployments, BYOK/HSM, JATIC/FedRAMP certifications, and a high-trust OSS community."], ["AI vulnerability remediation (CVEs / infra)", "Distinct from AI code remediation: agentic systems that ingest CVE / scanner / EDR / CNAPP output, reason about exploitability in the customer's specific environment, and drive remediation (patches, ticket actions, config changes) \u2014 not source-code fixes.", "Cogent Security ($42M Series A 2026-02), AISLE (Vlcek/Baloo/Fort), Zafran ($60M Series C 2025-12), Astelia ($35M 2026-02), Maze ($31M total).", "The 'last-mile' problem in vuln management is now investable: most breaches still root-cause to known CVEs that weren't patched in time. Agentic AI compresses MTTR. Buyer is the AppSec/VM team, budget is real, displacing legacy VM tooling.", "Overlap risk with ASPM (Apiiro, Endor) and CNAPP (Wiz, Orca) \u2014 they will ship remediation agents. Trust ceiling on autonomous patching in prod. Definition drift: 'exposure mgmt' vs 'vuln remediation' vs 'agentic SOC for AppSec'."], ["Browser-layer AI usage control", "Securing how enterprise users interact with consumer/SaaS GenAI through the browser \u2014 DLP, paste-blocking, content classification, agent oversight, secure-extension model that doesn't require switching to a managed browser.", "LayerX (Akamai-acquired May 2026), Island, Talon (PANW), Menlo, Surfshark, plus DSPM/CASB-for-AI players (Harmonic, Nightfall, Polymer).", "Workforce-AI adoption now outpaces enterprise controls; vendor strategies are converging on the browser as the cleanest enforcement chokepoint. Acquisition by Akamai validates that browser AI governance is a platform feature, not a standalone category.", "Risk of being commoditized inside ZTNA/SASE platforms (Zscaler, Netskope, PANW, Cisco) and inside enterprise browsers (Island, Talon). Microsoft Edge for Business + Copilot enterprise controls is the biggest existential threat."], ["Agentic AI orchestration & runtime governance becomes its own category", "Distinct from \"AI red teaming\" or \"agent discovery\" \u2014 a new layer is forming above model serving / below the agent: workflow intelligence, per-app/per-user policy, runtime guardrails. CodeIntegrity, Canyon Code, Geordie's Beam module, Operant Endpoint Protector, Sysdig headless cloud security all attack pieces of this stack.", "Geordie AI (Beam), CodeIntegrity, Canyon Code, Operant AI, Sysdig (headless), Manifold Security", "Enterprise agent rollouts hit production this year; existing AI-SOC and DSPM tools sit at the wrong layer to inspect agent decisions. Whoever lands the AuthNZ + observability primitive for cross-agent workflows likely owns the control plane.", "Standards risk: MCP, A2A, and AGNTCY may converge or fork \u2014 vendors locked to a single protocol may get marooned. Buyers conflate this with DLP / DSPM-for-AI and consolidate on incumbents. Hard to differentiate from CNAPP runtime tooling."], ["US policy tailwind for AI security", "White House EO \u201cPromoting Advanced AI Innovation and Security\u201d (2026-06-02): AI cybersecurity clearinghouse with industry, federal grant funds directed to AI vulnerability detection, expanded federal cyber hiring.", "AI code security & AI vuln remediation players (Cogent, Mobb, Pixee, AISLE, Maze); autonomous pentest", "Government demand + clearinghouse infrastructure favors remediation-at-scale and AI vuln discovery vendors; possible federal procurement wave.", "EO timelines (60-day milestones) vs. slow procurement; clearinghouse is voluntary; policy reversal risk."], ["Find-vs-fix gap widens (Glasswing effect)", "Anthropic\u2019s Project Glasswing / Claude Mythos found 10,000+ high-severity vulns in first month (6,202 high/critical across 1,000+ OSS projects); expanding to ~150 orgs in 15+ countries (6/2). Discovery is being commoditized by frontier models; remediation is the bottleneck.", "Mobb, Pixee, Cogent, AISLE, Maze, Zafran; XBOW on offense side", "Fix-side infrastructure (auto-triage, patch generation, OSS maintainer distribution) is the scarce asset as AI floods the discovery side.", "Frontier labs may move down-stack into remediation; OSS maintainer capacity; liability questions."], ["Agent identity land-grab accelerates", "Two stealth seeds in one week (Offroad, Willow) both targeting identity/access for AI agents \u2014 on top of Geordie\u2019s $30M A (5/28), Astrix\u2192Cisco, SGNL\u2192CrowdStrike. Same week: 1Password\u00d7OpenAI partnership on agent credential protection.", "Offroad, Willow, Geordie AI, Token Security, Clutch, Oasis, Linx, Glide Identity", "Agent access governance is the hottest seed category; incumbents buying rather than building.", "Crowding: 8+ funded players; unclear if standalone category or feature of IAM/IGA platforms."], ["Autonomous offense + remediation converge (\"post-Mythos\" defense)", "A single autonomous loop that discovers, validates exploitability of, and remediates real exploit paths at machine speed \u2014 moving past flag-only pentest as AI attackers industrialize the full kill chain.", "A Security, XBOW, RunSybil, Horizon3.ai, Pentera, Aisy", "Defenders need machine-speed exploit-path validation + proof-of-closure to match agentic attackers; validation-as-evidence becomes a CISO and insurer budget line.", "Crowded autonomous-pentest field; differentiation shifts to remediation/proof vs. detection; safety of running offensive agents in production."], ["Agentic AI security readiness gap & frameworks", "OWASP codifies the agentic attack surface (Agentic Research Council, Enterprise Adoption Maturity Model, Agentic Top 10) while enterprises lag \u2014 Cisco State of AI Security 2026: 29% prepared vs 83% deploying.", "OWASP GenAI, Cisco, Noma Security, Zenity, Straiker", "Wide deploy-vs-secure gap = TAM for agentic posture, guardrail, and maturity-scoring tooling.", "Frameworks still maturing; prompt injection \"remains unsolved\" (OWASP, Infosecurity Europe 6/8)."]]}, "Startup Ideas": {"headers": ["#", "Idea", "Problem / wedge", "Why now", "Early customers", "Moat", "Notes"], "rows": [[1, "Agentic IAM / Authorization for AI agents", "Today's IAM (Okta, Entra) was built for humans and service accounts; agents need delegated, scoped, and auditable capabilities per tool call.", "Every enterprise is piloting agents; NHI vendors only cover static identities.", "Fortune 500 platform teams deploying internal agents.", "Deep integration with agent frameworks (LangGraph, CrewAI, AutoGen) + policy engine (Rego/OPA successor).", "Competes with Astrix/Oasis if extended; adjacent to Auth0."], [2, "AI-native insider risk", "Detect data misuse by AI copilots and agents acting on a user's behalf.", "Copilot usage explodes; IRM vendors (DTEX, Forcepoint) lag on agent context.", "Regulated industries (FinServ, Pharma).", "Telemetry across LLM tool calls + data lineage.", "Natural extension for Cyberhaven/Material."], [3, "Deepfake defense for call centers & banking ops", "Voice vishing against support and wire-approval flows is now weekly news.", "LLMs + zero-shot voice cloning make attacks cheap; banks are paying.", "Retail banks, insurers, wealth managers.", "Voice-biometric + liveness + behavioral fusion; partnerships with Genesys/NICE.", "Reality Defender/Clarity active; high-trust channel play."], [4, "Security for coding agents (SWE agents)", "Devin-style SWE agents execute shell, write code, and open PRs; enterprises need a guardrail layer.", "Coding agents will write >50% of enterprise code by 2027.", "Platform / DevEx teams at large enterprises.", "Policy + execution sandboxing + policy-as-code.", "Can be delivered as a VS Code + GH App + CI plugin."], [5, "AI supply-chain posture (AI-BOM + provenance)", "Enterprises can't prove what model / dataset / fine-tune is in production.", "EU AI Act Article 50 + procurement requirements.", "Large enterprises in EU + US regulated sectors.", "Standards leadership (C2PA, AI-BOM, MITRE ATLAS).", "Cranium/HiddenLayer play here; space still fragmented."], [6, "AI-native DFIR (Digital forensics & IR)", "IR playbooks are manual; AI can reconstruct attacker TTPs from telemetry.", "Major incidents (MGM, Change Healthcare, Snowflake) made CEOs care; IR retainer spend is up.", "Mid-market and large enterprise; MSSPs.", "Dataset of attack narratives + on-call LLM agents.", "Mandiant/Crowdstrike hold big accounts; wedge via mid-market."], [7, "Governed retrieval for enterprise AI", "RAG pipelines leak entitlements; users see data they shouldn't.", "Every enterprise Copilot rollout trips on permissions propagation.", "Platform teams rolling out internal Copilots.", "ACL-aware retrieval + policy; source-of-truth SDK.", "Opsin/Knostic/Securiti adjacent; open-core angle viable."], [8, "Continuous AI red team as a service", "Snapshots red teams are obsolete when models + prompts change weekly.", "EU AI Act mandates ongoing testing; NIST RMF alignment.", "Banks, insurers, critical infrastructure.", "Bench of adversarial prompts + eval + pen test agents.", "Haize/SplxAI building this; commoditization risk without moat."], [9, "Small-business AI phishing defense", "SMBs cannot afford Abnormal/Material; AI-phish is hitting them hard.", "AI lowers attacker cost; MSP channel needs a wedge.", "MSPs serving SMBs.", "MSP-first pricing + Microsoft 365 API + QR/SMS/voice.", "Big MSPs (Datto/Barracuda MSP) may bundle."], [10, "Secrets & credential hygiene for agents", "Agents read repos and CI; exposed secrets become agent attack surface.", "Secret sprawl is #1 breach cause; NHI-era blast radius is bigger.", "Enterprise platform/security teams.", "Deep repo/CI/IDE integrations + scoped credential vending.", "Entro/GitGuardian adjacent; opportunity in agent-aware vending."], [11, "AI compliance automation for EU AI Act", "Mandatory AI risk classification, documentation, and audit trails by 2026.", "Hard deadlines; EU AI Act obligations for GPAI/deployers.", "Multinationals with EU operations.", "Prebuilt taxonomies + cross-framework mappings + evidence.", "Vanta/Drata extending; standalone play is fast but exit-optimized."], [12, "Model integrity / model signing as a standard", "Models are deployed without signing or verification; supply-chain attacks coming.", "Sigstore-style standards for models (Hugging Face, Chainguard pushing).", "Model publishers + regulated deployers.", "Developer-first OSS + SaaS; become default CLI.", "Chainguard/HiddenLayer could absorb this."], [13, "Browser-based AI employee DLP", "Employees paste sensitive data into ChatGPT / Claude; network egress tools miss it.", "Push/Harmonic point to browser as next control plane.", "Mid-market + enterprise CISOs.", "Chrome/Edge extension + managed browser + LLM classifiers.", "Harmonic, Push and Island compete; extend to agent traffic."], [14, "Synthetic-media KYC & liveness", "Existing KYC fails against modern deepfake/video injection.", "Regulated onboarding volumes + deepfake arms race.", "Banks, fintechs, crypto exchanges.", "Sensor fusion (accelerometer, camera, audio) + active challenges.", "Incode/Jumio incumbents; room for AI-first challenger."], [15, "AI threat intel fusion", "Threat intel is still document-centric; agents could fuse feeds into per-customer narratives.", "Recorded Future exit proves demand; AI lowers analyst cost.", "SOCs, fraud teams, national CERTs.", "LLM agents + proprietary enrichment feed.", "Crowdstrike/Mandiant dominant; mid-market wedge."], [16, "Detection-engineering-as-code platform", "Detections are still hand-authored by senior engineers; teams take 3-4 months to ship one. Spectrum proves the wedge but is greenfield \u2014 there is room for an open-core, framework-led entrant focused on cloud-first SOCs.", "Detection authoring is the bottleneck for AI-augmented SOC; agents now generate working detection logic from threat-model + telemetry samples. Sigma + OCSF maturation lowers translation cost.", "Series A SOCs at fintech/SaaS, MSSPs serving mid-market.", "Open-source Sigma/Yara generator + closed-source eval & deployment plane; community-driven detection corpus.", "Spectrum is similar but TechOperators-led and likely closed SaaS; differentiation is open-core, multi-tenant MSSP, and multi-cloud SIEM coverage day one."], [17, "Sovereign agentic SOC for regulated / public-sector markets", "GCC, EU public sector, and Allied defense customers cannot deploy US-hosted agentic SOC vendors due to data-residency and ITAR/EAR concerns; Rilian validated the demand with UAE NSOC.", "EU AI Act, NIS2, GCC localization rules, and US ITAR are forcing on-soil deployment for any agentic security product handling sensitive telemetry.", "GCC sovereign clouds, EU member-state SOCs, Allied defense ministries.", "Air-gappable agent runtime, model-agnostic (run on local LLMs / classified clouds), region-resident operations team, gov-cloud certifications (IL5/IL6, FedRAMP High, EU TI, GCC trust mark).", "Margin profile is closer to defense prime than SaaS; consider services overlay early. Distribution via local SIs (DTS, G42, Atos, Thales)."], [18, "Vendor-neutral AI Gateway / agent control plane", "PANW's Portkey acquisition validates the AI Gateway as the agentic-AI control plane, but locks customers into Prisma AIRS. There is a wedge for an open-core, multi-cloud, multi-vendor AI Gateway that runs in the customer's tenant and supports Anthropic, OpenAI, Google, Bedrock, Azure, and self-hosted models with consistent identity, policy, and observability.", "Every Fortune 1000 is rolling out internal agents in 2026; PANW's price will pull buyers; non-PANW shops (CrowdStrike, Cisco, GCP-first orgs) need an alternative; Cisco's Model Provenance Kit signals open-source momentum.", "CrowdStrike-aligned and GCP-native enterprises; FedRAMP-regulated agencies that cannot adopt PANW SaaS.", "Open-source policy and routing engine + closed-source enterprise plane (audit, IAM, telemetry); deep MCP integration; identity-aware semantic routing.", "Tier-1 risk: PANW + Microsoft + Google bundle gateways into existing security platforms. Differentiation = on-prem/sovereign + multi-LLM equality."], [19, "Autonomous offensive AI for the mid-market", "Armadin (Mandia) and PANW Unit 42 are building autonomous attack swarms for the F500. There is no equivalent for the mid-market: companies that cannot afford Mandiant/CrowdStrike but are now in the blast radius of agentic attackers operating at machine speed.", "Time-to-exploit has shrunk to hours (SecurityWeek 2026-04-30); Anthropic's Mythos demonstrates near-instant exploitation; SMBs are sitting ducks without continuous offensive validation.", "Mid-market SaaS, regional banks, MSP-served verticals (legal, accounting, healthcare clinics).", "Pre-built attack playbooks per vertical; cheap continuous validation as a self-serve product; channel via MSPs and cyber-insurance carriers.", "Channel-led GTM is hard but moats deeply once embedded with insurers (premium discounts for continuous validation)."], [20, "AI model provenance and supply-chain integrity for enterprises", "Cisco open-sourced Model Provenance Kit (MPK) on 2026-05-01; open-weights ecosystem (Reflection, Mistral, Llama, DeepSeek) explodes regulatory and supply-chain risk. Enterprises pulling 100s of models from HF need commercial-grade lineage, watermarking, integrity attestation, and continuous monitoring.", "EU AI Act enforcement begins; SBOM-for-AI mandates emerging; open-source MPK creates the de facto schema; enterprises will pay for SaaS productization with attestation, compliance reporting, and incident response.", "Regulated industries (FinServ, Pharma, Defense), AI platform teams, model marketplaces.", "Ecosystem of model fingerprints + signed attestation + integration with model registries (HF, Databricks, Vertex, SageMaker) + GRC mappings.", "Cisco may bundle a commercial version; Anthropic/OpenAI may ship native attestation. Differentiation = multi-vendor coverage and audit/regulatory mapping."], [21, "Vendor-neutral AI agent skill & tool inspection platform", "As agents proliferate via MCP servers, agent skills, and third-party tools, every enterprise needs to inspect, fingerprint, and gate these capability artifacts before import \u2014 and continuously verify them at runtime. SafeSkill-class capability is one slice; the bigger play is a platform spanning MCP, OpenAI Skills, Anthropic Skills, Google Vertex tools, and homegrown agent frameworks.", "ThreatBook launched SafeSkill on 5/7/2026 validating buyer pain. Cisco-Astrix deal (5/4) values agent governance at $400M+. MCP server count exploding 10x QoQ; multiple poisoned-skill / prompt-injection-via-tool incidents in Q1 2026.", "F500 platform-engineering teams piloting agents; AI/ML governance leads in regulated industries; MSSPs.", "Multi-vendor coverage breadth, library of skill fingerprints + adversarial test harness, integrations with agent platforms (Microsoft Agent 365, OpenAI/Anthropic, LangGraph, CrewAI), enterprise GRC mappings.", "ThreatBook's SafeSkill (5/7) is a regional/incumbent move; net-new pure-play startup with broad coverage and modern UX could win. Adjacency to Astrix (NHI for agents): identity + skill-integrity is the agentic security control plane."], [22, "Mid-market IT/OT-converged agentic SOC", "Kai's $125M is aimed at F500 IT/OT convergence (Claroty-class buyer). Mid-market manufacturers, utilities, and healthcare systems run the same OT footprint without budgets for Claroty + Forescout + a SOC vendor. A productized agentic platform that bridges IT and OT for the mid-market \u2014 preset playbooks, MSP-delivered, insurance-aligned \u2014 can claim the segment Kai will not.", "OT-targeted ransomware up sharply in 2026; cyber-insurance carriers underwriting OT controls; Five Eyes May 2026 joint guidance on agentic AI risk in critical-infra; Kai validates buyer pain at the top.", "Mid-market manufacturers, regional utilities, hospital systems, MSP-served verticals.", "Vertical-specific OT detection content; channel-led GTM via MSPs + cyber insurers; pre-mapped CMMC / NIS2 / IEC 62443 control overlays; bundled IR retainer.", "Risk: Kai expands down-market; Forescout/Claroty open mid-market SKUs. Differentiation: MSP-native delivery + insurer alignment + agentic playbooks for blended IT/OT + bundled GRC."], [23, "Mid-market human-risk security platform delivered via MSPs", "Frame ($50M, 5/11) targets enterprise. Mid-market (healthcare provider groups, RIAs/wealth managers, regional manufacturers) faces the same AI-generated deepfake-CFO, vishing, and BEC attacks but cannot afford an enterprise human-risk stack. Productized, MSP-delivered, role-personalized AI simulation + adaptive training tuned to each vertical.", "Frame validates buyer demand at the enterprise tier. Deepfake-enabled fraud losses crossed $1.56B in 2025; carriers underwriting policies now require human-risk controls; mid-market cyber budgets growing 18-22% YoY in 2026 surveys. MSPs control ~60% of mid-market security spend and lack a turnkey human-risk offering.", "MSPs serving healthcare, RIAs/wealth, regional manufacturers, hospitality, professional services. Cyber-insurance partners as channel.", "Vertical-specific deepfake simulations (e.g., HHS auditor calls, custodian wire instructions, ERP cutover requests); pre-built integrations with Microsoft 365 / Google Workspace / phishing-training stacks; insurer-aligned reporting (binder-ready evidence); MSP RMM integration; pay-per-seat MSP economics.", "Risk: KnowBe4 / Proofpoint launch MSP-friendly SKUs; Frame moves down-market. Differentiation: MSP-native delivery + vertical content libraries + insurer alignment + measurable reductions in deepfake-related claims."], [24, "Vendor-neutral defender-AI agent orchestration platform (\"DefenseGraph\")", "Microsoft MDASH (5/12) orchestrates 100+ AI agents inside Microsoft to find Windows CVEs. AWS open-sourced Rex (5/4), Cisco open-sourced DefenseClaw (RSAC). Enterprises want similar orchestration capability for THEIR custom defenders \u2014 but without locking into one cloud or frontier lab. A vendor-neutral framework + skills marketplace for defender agents (vuln triage, IR investigation, threat-intel correlation, detection authoring) spanning Anthropic, OpenAI, Google, open models.", "MDASH proves the architecture: orchestrating specialized agents beats single-shot LLM queries. CISOs want this internally but neither Microsoft, AWS, nor Cisco will ship it cross-cloud + cross-frontier-lab. Verified-defender access tiers from labs (Mythos, GPT-5.5-Cyber, Opus 4.7) create entitlement-management problem this category solves. Cisco-Astrix puts agent identity at $400M valuation; identity + orchestration is the natural control-plane pair.", "F500 SOCs, MSSPs, regulated industries running multi-cloud + multi-frontier-lab, defense primes building autonomous SOC stacks for federal customers.", "Open core + commercial skills marketplace; verified provenance for agent skills (extends Cisco MPK 5/1); pre-mapped to NIST AI RMF + EU AI Act + DoD IL5/6 controls; ecosystem partnerships with Anthropic / OpenAI / Google verified-defender tiers; cross-cloud telemetry collectors.", "Risks: Microsoft Agent 365 / Anthropic Skills bundle native orchestration; open-source projects (Rex, DefenseClaw, LangGraph for security) compress moat. Differentiation: vendor-neutral skill marketplace + verified provenance + GRC mappings + enterprise audit. Adjacent to Idea #21 (skill inspection) and Idea #20 (model provenance) \u2014 same team could build both."], [25, "Pure-play AI-MDR (managed defense for the agentic stack)", "Tenex.AI ($1B val), Exaforce ($725M), Dropzone, Tenex et al show MDR is now the dominant commercial wrapper for AI-SOC tech. But none of them are positioned specifically for the agentic stack itself \u2014 protecting MCP servers, agent runtimes, tool-use governance \u2014 as an MDR offering. SOCs increasingly run agents (Microsoft MDASH, AWS Rex, Cisco DefenseClaw) and need 24/7 humans-in-the-loop monitoring those agents.", "Exaforce + Tenex prove buyers will pay >$100M ARR multiples for AI-MDR. Helmet, Capsule, Manifold and Astrix all sell tooling but not the human-defended service tier. F500 buyers want 'someone to call when the agent fails' \u2014 particularly in regulated industries.", "F500 buying agentic SOC products in late-stage POCs (Astrix-Cisco customers, Microsoft Agent 365 deployments), regulated industries (financial services, healthcare), defense primes building federal autonomous-SOC stacks.", "Hybrid: own-IP agentic detection content + thin services layer + Helmet/Capsule-class tooling resold. Hire from Tenex/Dropzone/MSSP base. Long-term: skill-marketplace.", "Adjacent to Idea #24 (DefenseGraph). Differentiation vs Tenex/Exaforce: agentic-stack focus, not general SOC. Risk: incumbent MDRs (Arctic Wolf, Red Canary, Expel) add agent monitoring."], [26, "AI usage observability for the audit committee (BoA, regulators, insurers)", "Akamai-LayerX, Microsoft's E5/Defender for AI, and Zscaler/Netskope AI controls all sell to the CISO. But the audit committee / board / cyber-insurance underwriter buys a different abstraction: 'show me where AI created material risk this quarter and prove who approved it.' Today this lives in Word docs and Excel. A vertical product would aggregate from existing usage controls (LayerX, Harmonic, Nightfall, Microsoft, Google), generate audit-grade attestations, and map to EU AI Act + NIST AI RMF + NYDFS + insurance underwriting questionnaires.", "Akamai paid $205M for LayerX at ~$10M ARR \u2014 proves the AI-usage data is valuable. EU AI Act enforcement begins Aug 2026; SEC cyber rules + insurer questionnaires reference AI usage; Sarbanes-style attestation pressure is mounting on AI workflows. CISOs increasingly report to audit-committees not just CEOs.", "F500 audit committees, cyber insurers (Coalition, Resilience, Cowbell), F1000 internal-audit teams, regulated industries with named-board AI risk officers.", "Pre-built mappings to AI Act articles, NIST AI RMF subcategories, insurer questionnaires; auditor-grade evidence packs (cryptographic signing, immutable logs); board-ready charts. Partnerships with the Big-4 audit firms for distribution.", "Adjacent to Lema AI, Complyance, Vanta/Drata. Differentiation: not 'AI GRC for engineers' \u2014 'AI risk for boards.' Risk: Vanta/Drata extend; Big-4 build internal tools; LLM-based GRC tools (Vanta AI, Wiz AI) commoditize."], [27, "Vertical workflow-intelligence layer for security agents", "Canyon Code positions horizontally \u2014 but the highest-value first beachhead is the SOC. Every Tier-1 AI-SOC (Dropzone, 7AI, Prophet, Tenex, Exaforce) runs multi-step agent flows that today are black boxes for the CISO. A vertical observability + policy + cost-attribution layer for security-agent workflows could become \"Datadog for agentic SOC.\"", "Multi-vendor AI-SOC deployments are landing now; security teams already complain that they can't audit agent decision chains. CFOs are asking for per-investigation cost telemetry as token spend climbs.", "F500 SecOps teams already running 2+ AI-SOC pilots, MSSPs running mixed agent stacks, ISACs needing cross-tenant explainability.", "Privileged read-path into multiple AI-SOC vendor stacks via MCP/agent traces; canonical schema for agent decision provenance; tight loop with FinOps tooling.", "Compete with Canyon Code (horizontal) by going vertical; risk that AI-SOC vendors bundle this themselves; needs neutral-Switzerland positioning."], [28, "Agent-aware data exfiltration defense at the browser/IDE edge", "Operant Endpoint Protector, LayerX (Akamai), and Frame all move closer to the endpoint. There's a gap specifically for developer endpoints where coding agents (Cursor, Claude Code, Cline, Windsurf) routinely upload source code, secrets, and customer data into model providers. A purpose-built secrets + PII broker for coding agents \u2014 installed as IDE extension + browser extension \u2014 could pre-empt the next Wiz-style enterprise wedge.", "Coding-agent usage now spans Fortune 500 dev teams; security teams routinely block all coding agents because they have no granular controls. MCP-based access is exploding faster than DLP can keep up.", "Enterprises with > 500 devs that have already deployed Cursor/Claude Code; regulated industries (finance, healthcare, defense) that have outright bans they want to relax.", "Native IDE integration depth (LSP-style); deep MCP-server registry + reputation; data-flow tracing through agent loops; partnership with code-signing PKI vendors.", "Risk: Cursor/Anthropic/OpenAI ship their own DLP. Differentiate by being identity-aware, multi-agent, and air-gap deployable."], [29, "OAuth & integration-grant hygiene for the agent era", "Offroad\u2019s audit found 32% of 2,890 marketplace OAuth apps carry structural exposure (over-broad scopes, AI write access, dead publisher domains). Wedge: continuous audit + auto-revocation/right-sizing of third-party and agent OAuth grants across Google Workspace, GitHub, Slack.", "Agents multiply grants faster than IT can review; ohauth.ai proves the data is gatherable; SaaS-sprawl DLP buyers already exist.", "Mid-market CISOs on Google Workspace; platform-engineering teams adopting MCP/agent marketplaces", "Continuously-refreshed grant-risk graph; revocation workflows embedded in IdP", "Competes with Offroad, Push Security, Astrix/Cisco \u2014 but none lead with marketplace-app hygiene."], [30, "Remediation clearinghouse infrastructure (the fix-side of Glasswing)", "Frontier AI now finds vulns 100x faster than maintainers can fix them. Wedge: auto-triage + verified patch generation + downstream distribution service for OSS maintainers and enterprises, plugged into the EO\u2019s AI cybersecurity clearinghouse.", "White House EO (6/2) mandates a vuln clearinghouse; Anthropic says fixing remains the bottleneck; 10k+ Glasswing findings need a sink.", "OSS foundations, federal contractors, large enterprises consuming Glasswing-class feeds", "Patch-verification harness + maintainer trust network; potential federal anchor customer", "Competes with Mobb, Pixee, Cogent on enterprise side; clearinghouse/OSS distribution angle is unoccupied."], [31, "Exploit-path validation feed for cyber-insurance underwriting", "Insurers price AI-era risk on guesswork; no machine-speed proof of which exploit paths are actually open or closed at an insured.", "Autonomous validation (A Security/XBOW) now produces auditable proof-of-closure; \"post-Mythos\" loss expectations rising.", "Cyber insurers / MGAs, brokers", "Data network effect across insured exploit-path telemetry; underwriting-system integration.", "Wedge adjacent to A Security & Pentera; sell to underwriters, not CISOs."], [32, "Agentic-AI deployment gate scored to the OWASP maturity model", "83% of orgs are deploying agents but only 29% are ready; no standard pre-deploy readiness gate.", "OWASP just shipped the Agentic Enterprise Adoption Maturity Model + Agentic Top 10; board/regulator pressure mounting.", "Enterprises rolling out agents; auditors", "Becomes the de-facto OWASP-aligned scorecard; CI/CD + IdP integrations.", "Competes w/ Noma, Zenity, Straiker on posture; differentiator = standardized maturity scoring."]]}, "Weekly Log": {"headers": ["Week of (Mon)", "New fundings", "New exits / M&A", "New entrants", "Shutdowns / layoffs", "Themes / trends", "New ideas"], "rows": [["2026-04-20", "Initial build \u2014 see Funding Rounds tab", "Initial build \u2014 see Exits & M&A tab", "See Companies tab", "n/d", "See Themes tab", "See Startup Ideas tab"], ["2026-04-27", "Spectrum Security $19M seed (4/22); Rilian $17.5M seed+ext (4/23); plus prior week catch-ups: Artemis $70M Series A (4/15), Gitar $9M seed (4/15), Linx Security $50M Series B (3/31).", "Palo Alto Networks closed Koi (~$400M, 4/14) \u2014 defines \"Agentic Endpoint Security\"; Google formally closed Wiz $32B (3/26).", "Spectrum Security (detection engineering automation), Rilian (sovereign agentic defense). RSAC 2026 ISB winner Geordie AI + 9 finalists added (Token, Realm Labs, Charm, Clearly AI, Crash Override, Fig, Glide Identity, Humanix, ZeroPath).", "No notable AI+security shutdowns or layoffs this week. Deepwatch (Nov 2025) layoffs remain the most recent material event.", "1) Detection engineering as a wedge (Spectrum) \u2014 automating detection authoring upstream, not adding alerts. 2) Sovereign / nation-scale AI defense gaining VC validation (Rilian/UAE). 3) PANW formalizes \"Agentic Endpoint Security\" category \u2014 endpoint vendors now race to claim agent-runtime layer. 4) RSAC ISB lineup confirms agentic AI security as #1 theme \u2014 4+ of 10 finalists target agent governance/identity/runtime.", "New idea added (#16): Detection-engineering-as-code platform inspired by Spectrum thesis. New idea added (#17): Sovereign / regulated-market agentic SOC for GCC + EU public sector."], ["2026-05-04", "No major pure AI+security funding rounds tracked in window. Sevii product launch (4/28) is operational, not a financing event.", "PANW announces intent to acquire Portkey (AI Gateway) on 4/30 \u2014 defines new control-plane category for agentic AI. PANW + Armadin (Kevin Mandia's new offensive security co) strategic partnership, also 4/30. Catch-up: ServiceNow closed Armis $7.75B on 4/20.", "Sevii Cyber Swarm Defense (CSD) launches 4/28 with token-cost guarantee. Anthropic launches Claude Security public beta 4/30 (Opus 4.7-based vulnerability scanner; CrowdStrike, PANW, SentinelOne, Trend Micro, Wiz integrating). Cisco open-sources Model Provenance Kit 5/1.", "No notable AI+security pure-play shutdowns this week. Anthropic explicitly excluded from Pentagon IL6/IL7 list (5/1) over usage-policy disagreement \u2014 not a startup failure but a notable commercial signal.", "1) AI Gateway / agentic control plane formalized as a category by PANW-Portkey. 2) Frontier AI labs now central to cyber policy: OpenAI/Anthropic briefed Congress (4/29) on Mythos / GPT-5.4-Cyber capabilities. 3) Pentagon clears 8 firms (AWS/Google/MS/OpenAI/SpaceX/NVIDIA/Reflection/Oracle) for IL6/IL7 \u2014 Anthropic notably absent. 4) Time-to-exploit collapsed to hours; vendors (Anthropic, Sevii, Cisco) shipping defender-side counter-tools the same week. 5) BCG (4/29) frames the gap as \"synchronization\": speed of AI vs. governance.", "New idea added (#18): Vendor-neutral AI Gateway / agent control plane (open alternative to PANW-Portkey). New idea added (#19): Autonomous offensive AI for the mid-market (Armadin-class capability for SMB/MSP channel). New idea added (#20): AI model provenance / supply-chain integrity SaaS (productize Cisco MPK)."], ["2026-05-08 (run 2)", "No new pure AI+security funding rounds tracked in this 5/4\u20135/8 window beyond what was logged 5/4. Cybersecurity venture market saw funding concentrated in space security (True Anomaly $600M Series D) and consumer privacy (Cape $100M Series C, $900M val) \u2014 both adjacent but not pure AI+cyber.", "Cisco announces intent to acquire Astrix Security (~$400M, 2026-05-04) \u2014 non-human identity / AI agent security. NextPoint Group \u2192 UScontracting (5/7, govcon SIGINT/cyber, terms n/d).", "Microsoft Agent 365 GA on 5/1/2026 \u2014 IT/security control plane for AI agents (Entra ID per agent, Defender runtime governance, Intune extension; bundled in M365 E7 Frontier Suite at $15/user/mo). Netskope launches AgentSkope (5/6/2026) \u2014 agentic SOC/NOC automation. ThreatBook launches Flocks (AI-native SecOps) and SafeSkill (agent skill inspection) on 5/7/2026.", "No notable AI+security pure-play shutdowns or layoffs this week. Broader Q1 2026 tech layoffs continue (78K+ cumulative across industry per CNBC / Toms Hardware), but AI-security category remains a protected investment area at incumbents (Oracle explicitly carved out security from its 30K cuts).", "1) Non-human identity / agentic IAM officially the marquee category \u2014 Cisco-Astrix $400M intent validates Astrix-class plays at strategic-acquirer prices and signals NHI is now a must-have for platform vendors. 2) Agent control planes go GA \u2014 Microsoft Agent 365 GA on 5/1 turns \"secure the agentic workforce\" pitch into a productized SKU; expect SaaS-IDP-style consolidation around it. 3) Agent skill / tool integrity emerges as a distinct sub-category \u2014 ThreatBook SafeSkill points at MCP/skill marketplaces as the next supply-chain frontier. 4) Agentic SOC race continues to incumbents \u2014 Netskope, Arctic Wolf, Microsoft, ThreatBook all shipping agent-fleets for SOC; runway shrinks for pure-play AI-SOC startups absent unique data or distribution moat. 5) Fewer mega-rounds in pure AI+cyber this week vs. prior weeks (RSAC and Q1 cluster ~$3.6B); rotation toward space security and AI privacy.", "New idea added (#21): Vendor-neutral AI agent skill & tool inspection platform \u2014 capitalize on MCP/skill marketplace explosion + ThreatBook SafeSkill validation; expand on Astrix/Capsule adjacency."], ["2026-05-18", "", "", "", "", "", ""], ["2026-05-25", "", "", "", "", "", ""], ["2026-06-01", "", "", "", "", "", ""], ["2026-06-08", "", "", "", "", "", ""], ["2026-06-15", "", "", "", "", "", ""], ["2026-06-22", "", "", "", "", "", ""], ["2026-06-29", "", "", "", "", "", ""], ["2026-07-06", "", "", "", "", "", ""], ["2026-07-13", "", "", "", "", "", ""], ["2026-05-08 (run 3)", "Catch-up: Kai $125M (out-of-stealth, 2026-03-10, Evolution Equity Partners) \u2014 IT-OT-converged agentic AI security; Oasis Security Series B $120M (2026-03-19, Craft Ventures lead) \u2014 total $195M, agentic access management (NHI). No new pure AI+cyber rounds in window 5/5\u20135/8 (TechStartups 5/7 listing concentrated in sovereign AI / quantum / space / defense).", "Catch-up: Fortreum (Gryphon-backed) acquires Kovr.AI 2026-04-13 \u2014 AI-native FedRAMP Moderate compliance + Agent Artemis (agentic GRC); Cyera acquires Ryft (~$100-130M, 2026-04-23) \u2014 Israeli data lake startup, traceable data access for AI agents.", "Kai (added to Companies). No new entrants in 5/5\u20135/8 window beyond items captured in run 2.", "No notable AI+security pure-play shutdowns or layoffs in this window.", "New theme added: Frontier-lab \"Trusted Access for Cyber\" tier \u2014 OpenAI ships GPT-5.5-Cyber to vetted defenders 5/7 (one month after Anthropic Mythos Preview); Cognizant launches Secure AI Services 5/7 \u2014 SI/MSSP vendors entering agentic-AI-security market. Reinforces prior week patterns: NHI/agent identity now strategic for platform vendors; agentic SOC race tilting to incumbents.", "New idea added (#22): Mid-market IT/OT-converged agentic SOC \u2014 capture the segment Kai cannot serve from F500-up. MSP-delivered + insurer-aligned."], ["2026-05-11 (week of)", "Exaforce $125M Series B at $725M val (2026-05-12, HarbourVest lead with Peak XV, Mayfield, Khosla, Seligman, AICONIC) \u2014 AI-SOC/agentic SOC, brings total to $200M; Frame Security $50M out-of-stealth (2026-05-11, Index Ventures lead with Team8, Picture Capital) \u2014 human risk security / AI social engineering defense; ex-Wiz and Unit 8200 founders.", "No new closed AI+security M&A in 5/8\u20135/15 window. (Cisco/Astrix intent announced 5/4 prior week; ServiceNow/Armis and Cyera/Ryft already captured.)", "Exaforce and Frame Security added to Companies tab; Microsoft MDASH (multi-model agentic Windows vuln-scanning harness) launched 2026-05-12 \u2014 internal capability, not a startup, but defines defender-side AI vulnerability discovery as table-stakes.", "No pure-play AI+security shutdowns. Adjacent signal: Cloudflare laid off 1,100 (2026-05-08, first mass layoff in 16-year history, \"AI made jobs obsolete\"); Cisco cut ~4,000 (~5%) on 2026-05-14 to fund AI and cybersecurity investment. Vendors monetizing AI internally before customers; signals AI-driven cost-base resets across the security-adjacent vendor stack.", "Two new themes added: Human risk security as a budget line (Frame at $50M validates new category replacing legacy security-awareness) and Defender AI vulnerability discovery becomes table-stakes (Microsoft MDASH joins Anthropic Mythos / OpenAI GPT-5.5-Cyber pattern \u2014 100+ agents, 88.45% CyberGym, 16 Windows CVEs incl. 4 critical RCEs).", "Two new ideas added (#23: Mid-market human-risk security via MSPs; #24: Vendor-neutral defender-AI agent orchestration platform / DefenseGraph). Ideas tab now at 24 entries."], ["2026-05-15 (methodology fix)", "No new funding rounds in this entry \u2014 methodology-fix run triggered by missed coverage of Nebari (OpenTeams).", "No new exits.", "Nebari added to Companies (#119) \u2014 open-source sovereign AI infrastructure (JupyterHub distro). Member of 2026 CrowdStrike/AWS/NVIDIA Cybersecurity Startup Accelerator (announced Jan 2026); we previously caught only 4 of the 35 cohort companies (Simbian, Geordie AI, Artemis, Sevii) because we never tracked the accelerator cohort list as a source.", "n/a", "NEW THEME #17 added: 'Sovereign / Compliant AI infrastructure' \u2014 scope explicitly expanded from 'AI applied to security' to also include 'security/compliance/sovereignty applied to AI infrastructure.' Methodology change: add CrowdStrike/AWS/NVIDIA accelerator cohort, AWS Generative AI Accelerator, NVIDIA Inception (cyber track), Y Combinator security batch, Mach37, DataTribe, and DoD JATIC product list as standing discovery sources. Expand keyword set with: sovereign AI, classified AI infrastructure, secure JupyterHub, AI data sovereignty, FedRAMP AI workbench, JATIC, IL5/IL6 AI platforms.", "No new ideas in this entry (methodology fix run)."], ["2026-05-15 (methodology fix \u2014 correction)", "n/a \u2014 methodology correction run.", "n/a", "Companies row #119 corrected: original Nebari add was the OpenTeams/JupyterHub project (Travis Oliphant) \u2014 WRONG company. The actual Nebari in the CrowdStrike/AWS/NVIDIA 2026 cohort is a stealth AI-product-security startup co-founded and CEO'd by Guy Arazi (ex-Microsoft MSRC V&M, 150+ CVEs; ex-PANW XCloud Research). Profile rewritten; sources cleaned (removed OpenTeams docs, added Pulse 2.0 founder interview, Nov 2025).", "n/a", "METHODOLOGY LESSON: name-collision discipline. When a CrowdStrike-cohort / accelerator name matches an existing OSS project, do NOT assume it's the same entity. Required check going forward: (a) confirm founder names + LinkedIn / interview citations against the cohort participant, (b) verify HQ and stage match accelerator framing, (c) explicitly disambiguate if the name has prior art. The 'Sovereign / Compliant AI infrastructure' theme (#17) remains in scope per prior user confirmation, but its trigger company is gone \u2014 left as a tracked theme with watch-list reps (Anaconda, Domino, Determined AI, Saturn Cloud, Coiled).", "n/a"], ["2026-05-16 (methodology fix \u2014 code remediation gap)", "Backfill: Cogent Security $42M Series A (2026-02-18, Bain lead); Zafran $60M Series C (2025-12-02, Menlo lead); Astelia $35M s <script>
const DATA = JSON.parse(document.getElementById("data").textContent);
const tabs = document.querySelectorAll(".tab");
const panels = document.querySelectorAll(".panel");
const savedTab = localStorage.getItem("aisec-tab") || "companies";
function activate(name) {
  tabs.forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  panels.forEach(p => p.classList.toggle("active", p.id === "panel-" + name));
  localStorage.setItem("aisec-tab", name);
}
tabs.forEach(t => t.addEventListener("click", () => activate(t.dataset.tab)));
activate(savedTab);
function makeGrid(elId, sheetName) {
  const sheet = DATA[sheetName]; if (!sheet) return;
  new gridjs.Grid({
    columns: sheet.headers.map(h => ({ name: h, sort: true })),
    data: sheet.rows.map(r => r.map(c => c === null ? "" : String(c))),
    sort: true, search: true, pagination: { limit: 25 }, resizable: true
  }).render(document.getElementById(elId));
}
makeGrid("grid-companies", "Companies");
makeGrid("grid-funding", "Funding Rounds");
makeGrid("grid-exits", "Exits & M&A");
makeGrid("grid-people", "People & Thought Leaders");
makeGrid("grid-sources", "Sources");
function escapeHtml(s) { if (s === null || s === undefined) return ""; return String(s).replace(/[&<>"\']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","\'":"&#39;"}[c])); }
const themes = DATA["Themes"];
if (themes) themes.rows.forEach(r => {
  const c = document.createElement("div"); c.className = "theme-card";
  c.innerHTML = `<h3>${escapeHtml(r[0])}</h3><p>${escapeHtml(r[1])}</p><p><span class="label">Players:</span> ${escapeHtml(r[2])}</p><p><span class="label">Thesis:</span> ${escapeHtml(r[3])}</p><p><span class="label">Risks:</span> ${escapeHtml(r[4])}</p>`;
  document.getElementById("panel-themes").appendChild(c);
});
const ideas = DATA["Startup Ideas"];
if (ideas) ideas.rows.forEach(r => {
  const c = document.createElement("div"); c.className = "idea-card";
  c.innerHTML = `<h3>#${escapeHtml(r[0])} — ${escapeHtml(r[1])}</h3><p><span class="label">Wedge:</span> ${escapeHtml(r[2])}</p><p><span class="label">Why now:</span> ${escapeHtml(r[3])}</p><p><span class="label">Early customers:</span> ${escapeHtml(r[4])}</p><p><span class="label">Moat:</span> ${escapeHtml(r[5])}</p>${r[6] ? `<p class="meta">${escapeHtml(r[6])}</p>` : ""}`;
  document.getElementById("panel-ideas").appendChild(c);
});
const weekly = DATA["Weekly Log"];
if (weekly) [...weekly.rows].reverse().forEach(r => {
  const c = document.createElement("div"); c.className = "weekly-card";
  c.innerHTML = `<div class="week">Week of ${escapeHtml(r[0])}</div><h3>Summary</h3><div class="row"><span class="label">New fundings</span> ${escapeHtml(r[1])}</div><div class="row"><span class="label">Exits / M&amp;A</span> ${escapeHtml(r[2])}</div><div class="row"><span class="label">New entrants</span> ${escapeHtml(r[3])}</div><div class="row"><span class="label">Shutdowns</span> ${escapeHtml(r[4])}</div><div class="row"><span class="label">Themes / trends</span> ${escapeHtml(r[5])}</div><div class="row"><span class="label">New ideas</span> ${escapeHtml(r[6])}</div>`;
  document.getElementById("panel-weekly").appendChild(c);
});
const COLORS = ["#b45309","#0e7490","#65a30d","#7c3aed","#db2777","#dc2626","#0891b2","#a16207","#4d7c0f","#be185d","#1d4ed8","#9333ea"];
function countBy(rows, idx) { const m = {}; rows.forEach(r => { const v = (r[idx] || "n/d").toString().trim() || "n/d"; m[v] = (m[v] || 0) + 1; }); return Object.entries(m).sort((a,b) => b[1] - a[1]); }
const cos = DATA["Companies"];
if (cos) {
  const h = cos.headers; const cI = h.indexOf("Category"); const sI = h.indexOf("Stage");
  const cats = countBy(cos.rows, cI); const stages = countBy(cos.rows, sI);
  new Chart(document.getElementById("catChart"), { type: "bar", data: { labels: cats.map(c => c[0]), datasets: [{ data: cats.map(c => c[1]), backgroundColor: COLORS, borderRadius: 4 }] }, options: { indexAxis: "y", maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: "#f5f5f4" } }, y: { grid: { display: false }, ticks: { font: { size: 11 } } } } } });
  new Chart(document.getElementById("stageChart"), { type: "doughnut", data: { labels: stages.map(s => s[0]), datasets: [{ data: stages.map(s => s[1]), backgroundColor: COLORS }] }, options: { maintainAspectRatio: false, plugins: { legend: { position: "right", labels: { font: { size: 11 }, boxWidth: 12 } } } } });
}
</script>
