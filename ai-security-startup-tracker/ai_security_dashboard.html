uman identity / AI agent security", "Cisco intent to acquire announced 2026-05-04 (~$400M, per Calcalist/Globes). Astrix raised >$85M from Bessemer/CRV/Menlo; founded 2021 by Unit 8200 vets Alon Jackson + Idan Gour. Plan: integrate into Cisco Identity Intelligence, Secure Access, and Duo to discover/govern/secure AI agents and non-human identities. Largest pure-play NHI exit to date and a defining marker that NHI/agent-IAM is now a strategic must-have for platform vendors."], ["2026-04-13", "Kovr.AI", "Fortreum (closed)", "n/d", "AI compliance / FedRAMP / Agentic GRC", "Gryphon-backed Fortreum acquires AI-native FedRAMP Moderate-authorized compliance platform; Agent Artemis (agentic AI in Zero-Data-Retention env) + patented \"build once, map anywhere\" mapping; deployed at USAF, Space Force, Accenture Federal. Combines with Fortreum CMMC C3PAO + FedRAMP assessment practice."], ["2026-04-23", "Ryft Data", "Cyera (closed)", "100-130 (est.)", "Data security for AI / Data lake for AI agents", "Cyera's 4th acquisition in 5 years; Israeli startup with automated data lake for enterprises deploying AI agents — adds traceable data access for agentic workloads to Cyera's $9B-valuation DSPM stack."]]}, "Themes": {"headers": ["Theme", "Description", "Representative players", "Investment thesis", "Risks / open questions"], "rows": [["AI-SOC / Autonomous analyst", "LLM-powered agents that triage, enrich, and investigate alerts, replacing or augmenting Tier-1/2 analysts.", "Dropzone AI, Prophet, Radiant, Simbian, Crogl, Andesite, Seven.AI", "SOCs are understaffed, drowning in alerts; MSSPs are first adopters. Ride the shift from SOAR playbooks to reasoning agents.", "Commoditization risk as SIEM/EDR vendors ship native copilots (Microsoft Security Copilot, CrowdStrike Charlotte, Splunk AI)."], ["GenAI firewall / prompt security", "Inline guardrails for LLM apps: prompt injection, jailbreak, PII redaction, output policy enforcement.", "Lakera, Prompt Security, Apex, Pillar, Protect AI (PANW), Robust Intelligence (Cisco)", "Every enterprise GenAI rollout requires guardrails; fast TAM growth.", "Hyperscalers (AWS Bedrock Guardrails, Azure AI Content Safety) bundle basic protection; differentiation via policy + telemetry + model coverage."], ["AI red teaming / AI pentest", "Automated adversarial evaluation of models, agents, and full AI apps.", "Haize Labs, Grey Swan, Mindgard, SplxAI, XBOW, Repello", "Aligned with regulation (EU AI Act, NIST AI RMF) + enterprise need for pre-prod assurance.", "Often sold as services; productizing continuous testing at scale is hard."], ["Agentic AI security", "Runtime controls, policy, and identity for autonomous AI agents and tool use.", "Noma, Straiker, Invariant Labs, Conifers, Simbian, Token, Clutch", "Agent adoption is exploding; no mature security primitives yet. White-space akin to early container security.", "Category is pre-enterprise; definitions still fluid. Risk of overlap with NHI and GenAI firewall."], ["Non-human identity (NHI) / machine identity", "Discovery and governance of service accounts, API keys, service principals, and agents.", "Astrix, Oasis, Token, Clutch, Entro, Venafi (CyberArk)", "10-50x more NHIs than humans in cloud estates. Secret-sprawl incidents are on the rise (Internet Archive, Snowflake).", "Risk of being absorbed into IAM platforms (Okta, Microsoft Entra)."], ["Data security for AI (DSPM / AI-DLP)", "Discover, classify, and govern sensitive data flowing to AI systems.", "Cyera, Sentra, Normalyze, BigID, Cyberhaven, Harmonic, Securiti", "Boards care about data leakage to GenAI. Cyera's growth is the bull case.", "Commoditization by CNAPPs (Wiz, Orca). Differentiation via lineage and policy across SaaS."], ["AI governance / model risk", "Governance frameworks, AI-BOMs, policy, and audit trails aligned with EU AI Act / NIST RMF.", "Credo AI, Holistic AI, Cranium, Monitaur, Fiddler, Arthur", "Regulation-driven growth; procurement line-item in 2026 budgets.", "Low software margin; competes with GRC platforms and Big 4 services."], ["Deepfake / synthetic media defense", "Detection and provenance for AI-generated voice, image, and video.", "Adaptive, Reality Defender, GetReal, Clarity", "Vishing/deepfake-of-CFO incidents rising fast. BEC + KYC are growing wedges.", "Detection is an arms race; provenance (C2PA) may solve part of problem."], ["AI for code security", "LLMs to find, prioritize, and (critically) AUTO-FIX vulnerabilities in source code. The remediation sub-segment is its own race: deterministic-codemod approaches (Pixee, Mobb) vs. AI-native SAST + fix (Corgea, ZeroPath, Gecko, Almanax) vs. incumbent fix features bolted onto Snyk/Checkmarx/Veracode/GitHub.", "Semgrep, Socket, Endor Labs, Apiiro, Aikido, Corgea, Pixee, Mobb, ZeroPath, Gecko, Almanax, AquilaX, Ghost. Incumbent fix features: GitHub Copilot Autofix, Snyk Agent Fix / DeepCode AI, Veracode Fix, Checkmarx AI.", "Developers will adopt AppSec only when it is embedded in CI + IDE; GenAI makes this possible.", "(1) Incumbent gravity: GitHub Copilot Autofix is free for OSS and bundled with GHAS; Snyk Agent Fix is the default in many enterprises. (2) Trust ceiling on AI patches — merge rate, regressions, license/IP issues. (3) Fix quality is benchmark-able and could commoditize fast."], ["AI-native email & social engineering", "Behavioral detection of BEC, phishing, QR-phishing, deepfake voice calls, Slack/Teams abuse.", "Abnormal, Material, Adaptive, Tessian (now Proofpoint)", "Abnormal's scale shows durable pricing power; attackers use LLMs to author phish at scale.", "Gmail/Microsoft 365 native defenses improving; AI-phish defense must span collab, voice, SMS."], ["AI-enabled GRC / compliance", "Policy-as-code, evidence collection, and continuous control monitoring with LLM summarization.", "Vanta, Drata, Secureframe, Anecdotes, Zenity (copilot GRC)", "SOC 2/ISO is table-stakes; AI expands to NIS2, EU AI Act, HIPAA.", "Crowded market; differentiation on AI quality and enterprise-grade workflows."], ["Cloud + runtime AI", "AI-based detection of cloud workloads and container runtime anomalies.", "Wiz, Orca, Upwind, Sweet, RAD, Kodem, Armo", "Runtime + eBPF + LLM reasoning is the next CNAPP wave.", "Consolidation risk: Wiz / Palo Alto / CrowdStrike are buying up this stack."], ["AI agent skill / tool marketplace security", "Inspection, signing, and runtime governance of agent skills, tools, and marketplace integrations — a new attack surface as MCP/Skill marketplaces explode.", "ThreatBook SafeSkill (5/7/2026), Astrix (post-Cisco), Capsule Security, emerging stealth co.", "MCP servers, agent skill packs, and tool marketplaces create a 2025–2026 era equivalent of the npm/pypi supply-chain problem. Buyers want pre-import inspection, marketplace policy, and inventory remediation. SecOps + AppSec budget overlap.", "Risk that agent platform vendors (Microsoft Agent 365, OpenAI, Anthropic) bundle native marketplace inspection. Differentiation: multi-vendor coverage, hybrid runtime, enterprise governance + audit."], ["Frontier-lab \"Trusted Access for Cyber\" tier", "Frontier AI labs ship special, less-restrictive variants of their flagship models to vetted defender teams (capability for vuln triage, malware analysis, exploit POC writing, simulations) under verified-access programs.", "OpenAI Trusted Access for Cyber + GPT-5.5-Cyber (5/7); Anthropic Claude Mythos Preview (4/30) + Project Glasswing consortium; CrowdStrike/PANW/SentinelOne/Trend/Wiz integrations.", "Defender side gets a 'capability uplift' channel matching offensive AI; vendors can build differentiated detection + IR products on top of these tiers; insurance & regulators may eventually mandate vetted-defender access.", "Capability-asymmetry risk if access is narrow; potential for liability/regulatory blowback (EU AI Act + DoD); platform lock-in across labs; non-trivial entitlement-management problem for SOCs spanning Anthropic + OpenAI + Google trust tiers."], ["Human risk security as a budget line", "AI-generated phishing, voice/video deepfakes, and personalized social engineering at scale force enterprises to treat humans as a first-class attack surface. New category replaces legacy security-awareness vendors with AI-vs-AI simulation + adaptive training.", "Frame Security (5/11/2026 stealth-exit $50M); Adaptive Security ($43M a16z + OpenAI Startup Fund); KnowBe4 (incumbent); Hoxhunt; Living Security; emerging stealth co.", "Buyers report 50-70% of breach root cause is human. AI defenses outside email gateway are inadequate; CFO voice-deepfake losses crossed $1.56B in 2025. Frame at $50M from Index validates buyer demand. Adjacent budget to BEC/AI-email and to GRC training.", "Risk: incumbents (KnowBe4, Proofpoint, Abnormal) bundle native AI simulation; \"human risk score\" is hard to externally benchmark. Differentiation requires role-personalization + multi-channel coverage + measurable behavior change."], ["Defender AI vulnerability discovery becomes table-stakes", "Frontier-lab and platform vendors ship branded \"AI finds and proves bugs\" capability. Microsoft MDASH (5/12) joins Anthropic Mythos and OpenAI GPT-5.5-Cyber. Each system orchestrates dozens-to-hundreds of specialized AI agents to find, validate, and exploit vulnerabilities pre-attacker.", "Microsoft MDASH (5/12 — 16 Windows CVEs incl. 4 critical RCEs; 88.45% CyberGym); Anthropic Mythos Preview; OpenAI GPT-5.5-Cyber; XBOW ($75M Sequoia); Endor Labs AURI; Snyk + Claude integration; CrowdStrike, PANW, SentinelOne, TrendAI, Wiz integrating Opus 4.7.", "AI vulnerability discovery shifts from research demo (DARPA AIxCC, XBOW) to mainstream product capability. Microsoft using MDASH internally to break its own annual CVE record. Defenders catching up to offensive AI capability on the same systems. Vendors will need to either build native or bind to frontier-lab cyber tiers.", "Risk: capability concentration in 4-5 frontier labs + Microsoft. Liability for false-positive triage. Open-source equivalents (DefenseClaw, Rex) may compress proprietary moats. Enterprise entitlement management across multi-vendor cyber AI access still unsolved."], ["Sovereign / Compliant AI infrastructure", "Open-source, on-prem-friendly platforms for deploying AI/data-science workloads in regulated, air-gapped, or classified environments. Combines JupyterHub-class workbenches with built-in RBAC, SSO, reproducible envs, audit, and IaC so regulated buyers can stand up an AI dev stack without a hyperscaler-managed service.", "Anaconda Enterprise, Domino Data Lab, Determined AI (HPE), Saturn Cloud, Coiled, Run:AI (pre-NVIDIA); OSS: Nebari-dev (OpenTeams), Kubeflow, Open MLOps. (Note: OpenTeams' Nebari was originally added here in error — the 'Nebari' in the 2026 CrowdStrike accelerator is a different, stealth AI-product-security company by Guy Arazi.)", "Defense, biotech, finserv, EU/GCC public-sector cannot rely on SageMaker/Vertex/Databricks due to sovereignty, FedRAMP/IL-tier, HIPAA, ITAR/EAR, or data residency. CrowdStrike/AWS/NVIDIA accelerator inclusion of Nebari signals AI-infra-security is now sold INTO the security budget. Procurement increasingly involves CISO sign-off; platform teams want one stack across clouds + airgap.", "Thin software margins on OSS-led GTM; hyperscalers (Bedrock sovereign tiers, Vertex AI Confidential, Azure Sovereign Cloud) compete from above; Snowflake/Databricks compete from the data-platform side. Differentiation = airgap-credible deployments, BYOK/HSM, JATIC/FedRAMP certifications, and a high-trust OSS community."], ["AI vulnerability remediation (CVEs / infra)", "Distinct from AI code remediation: agentic systems that ingest CVE / scanner / EDR / CNAPP output, reason about exploitability in the customer's specific environment, and drive remediation (patches, ticket actions, config changes) — not source-code fixes.", "Cogent Security ($42M Series A 2026-02), AISLE (Vlcek/Baloo/Fort), Zafran ($60M Series C 2025-12), Astelia ($35M 2026-02), Maze ($31M total).", "The 'last-mile' problem in vuln management is now investable: most breaches still root-cause to known CVEs that weren't patched in time. Agentic AI compresses MTTR. Buyer is the AppSec/VM team, budget is real, displacing legacy VM tooling.", "Overlap risk with ASPM (Apiiro, Endor) and CNAPP (Wiz, Orca) — they will ship remediation agents. Trust ceiling on autonomous patching in prod. Definition drift: 'exposure mgmt' vs 'vuln remediation' vs 'agentic SOC for AppSec'."]]}, "Startup Ideas": {"headers": ["#", "Idea", "Problem / wedge", "Why now", "Early customers", "Moat", "Notes"], "rows": [[1, "Agentic IAM / Authorization for AI agents", "Today's IAM (Okta, Entra) was built for humans and service accounts; agents need delegated, scoped, and auditable capabilities per tool call.", "Every enterprise is piloting agents; NHI vendors only cover static identities.", "Fortune 500 platform teams deploying internal agents.", "Deep integration with agent frameworks (LangGraph, CrewAI, AutoGen) + policy engine (Rego/OPA successor).", "Competes with Astrix/Oasis if extended; adjacent to Auth0."], [2, "AI-native insider risk", "Detect data misuse by AI copilots and agents acting on a user's behalf.", "Copilot usage explodes; IRM vendors (DTEX, Forcepoint) lag on agent context.", "Regulated industries (FinServ, Pharma).", "Telemetry across LLM tool calls + data lineage.", "Natural extension for Cyberhaven/Material."], [3, "Deepfake defense for call centers & banking ops", "Voice vishing against support and wire-approval flows is now weekly news.", "LLMs + zero-shot voice cloning make attacks cheap; banks are paying.", "Retail banks, insurers, wealth managers.", "Voice-biometric + liveness + behavioral fusion; partnerships with Genesys/NICE.", "Reality Defender/Clarity active; high-trust channel play."], [4, "Security for coding agents (SWE agents)", "Devin-style SWE agents execute shell, write code, and open PRs; enterprises need a guardrail layer.", "Coding agents will write >50% of enterprise code by 2027.", "Platform / DevEx teams at large enterprises.", "Policy + execution sandboxing + policy-as-code.", "Can be delivered as a VS Code + GH App + CI plugin."], [5, "AI supply-chain posture (AI-BOM + provenance)", "Enterprises can't prove what model / dataset / fine-tune is in production.", "EU AI Act Article 50 + procurement requirements.", "Large enterprises in EU + US regulated sectors.", "Standards leadership (C2PA, AI-BOM, MITRE ATLAS).", "Cranium/HiddenLayer play here; space still fragmented."], [6, "AI-native DFIR (Digital forensics & IR)", "IR playbooks are manual; AI can reconstruct attacker TTPs from telemetry.", "Major incidents (MGM, Change Healthcare, Snowflake) made CEOs care; IR retainer spend is up.", "Mid-market and large enterprise; MSSPs.", "Dataset of attack narratives + on-call LLM agents.", "Mandiant/Crowdstrike hold big accounts; wedge via mid-market."], [7, "Governed retrieval for enterprise AI", "RAG pipelines leak entitlements; users see data they shouldn't.", "Every enterprise Copilot rollout trips on permissions propagation.", "Platform teams rolling out internal Copilots.", "ACL-aware retrieval + policy; source-of-truth SDK.", "Opsin/Knostic/Securiti adjacent; open-core angle viable."], [8, "Continuous AI red team as a service", "Snapshots red teams are obsolete when models + prompts change weekly.", "EU AI Act mandates ongoing testing; NIST RMF alignment.", "Banks, insurers, critical infrastructure.", "Bench of adversarial prompts + eval + pen test agents.", "Haize/SplxAI building this; commoditization risk without moat."], [9, "Small-business AI phishing defense", "SMBs cannot afford Abnormal/Material; AI-phish is hitting them hard.", "AI lowers attacker cost; MSP channel needs a wedge.", "MSPs serving SMBs.", "MSP-first pricing + Microsoft 365 API + QR/SMS/voice.", "Big MSPs (Datto/Barracuda MSP) may bundle."], [10, "Secrets & credential hygiene for agents", "Agents read repos and CI; exposed secrets become agent attack surface.", "Secret sprawl is #1 breach cause; NHI-era blast radius is bigger.", "Enterprise platform/security teams.", "Deep repo/CI/IDE integrations + scoped credential vending.", "Entro/GitGuardian adjacent; opportunity in agent-aware vending."], [11, "AI compliance automation for EU AI Act", "Mandatory AI risk classification, documentation, and audit trails by 2026.", "Hard deadlines; EU AI Act obligations for GPAI/deployers.", "Multinationals with EU operations.", "Prebuilt taxonomies + cross-framework mappings + evidence.", "Vanta/Drata extending; standalone play is fast but exit-optimized."], [12, "Model integrity / model signing as a standard", "Models are deployed without signing or verification; supply-chain attacks coming.", "Sigstore-style standards for models (Hugging Face, Chainguard pushing).", "Model publishers + regulated deployers.", "Developer-first OSS + SaaS; become default CLI.", "Chainguard/HiddenLayer could absorb this."], [13, "Browser-based AI employee DLP", "Employees paste sensitive data into ChatGPT / Claude; network egress tools miss it.", "Push/Harmonic point to browser as next control plane.", "Mid-market + enterprise CISOs.", "Chrome/Edge extension + managed browser + LLM classifiers.", "Harmonic, Push and Island compete; extend to agent traffic."], [14, "Synthetic-media KYC & liveness", "Existing KYC fails against modern deepfake/video injection.", "Regulated onboarding volumes + deepfake arms race.", "Banks, fintechs, crypto exchanges.", "Sensor fusion (accelerometer, camera, audio) + active challenges.", "Incode/Jumio incumbents; room for AI-first challenger."], [15, "AI threat intel fusion", "Threat intel is still document-centric; agents could fuse feeds into per-customer narratives.", "Recorded Future exit proves demand; AI lowers analyst cost.", "SOCs, fraud teams, national CERTs.", "LLM agents + proprietary enrichment feed.", "Crowdstrike/Mandiant dominant; mid-market wedge."], [16, "Detection-engineering-as-code platform", "Detections are still hand-authored by senior engineers; teams take 3-4 months to ship one. Spectrum proves the wedge but is greenfield — there is room for an open-core, framework-led entrant focused on cloud-first SOCs.", "Detection authoring is the bottleneck for AI-augmented SOC; agents now generate working detection logic from threat-model + telemetry samples. Sigma + OCSF maturation lowers translation cost.", "Series A SOCs at fintech/SaaS, MSSPs serving mid-market.", "Open-source Sigma/Yara generator + closed-source eval & deployment plane; community-driven detection corpus.", "Spectrum is similar but TechOperators-led and likely closed SaaS; differentiation is open-core, multi-tenant MSSP, and multi-cloud SIEM coverage day one."], [17, "Sovereign agentic SOC for regulated / public-sector markets", "GCC, EU public sector, and Allied defense customers cannot deploy US-hosted agentic SOC vendors due to data-residency and ITAR/EAR concerns; Rilian validated the demand with UAE NSOC.", "EU AI Act, NIS2, GCC localization rules, and US ITAR are forcing on-soil deployment for any agentic security product handling sensitive telemetry.", "GCC sovereign clouds, EU member-state SOCs, Allied defense ministries.", "Air-gappable agent runtime, model-agnostic (run on local LLMs / classified clouds), region-resident operations team, gov-cloud certifications (IL5/IL6, FedRAMP High, EU TI, GCC trust mark).", "Margin profile is closer to defense prime than SaaS; consider services overlay early. Distribution via local SIs (DTS, G42, Atos, Thales)."], [18, "Vendor-neutral AI Gateway / agent control plane", "PANW's Portkey acquisition validates the AI Gateway as the agentic-AI control plane, but locks customers into Prisma AIRS. There is a wedge for an open-core, multi-cloud, multi-vendor AI Gateway that runs in the customer's tenant and supports Anthropic, OpenAI, Google, Bedrock, Azure, and self-hosted models with consistent identity, policy, and observability.", "Every Fortune 1000 is rolling out internal agents in 2026; PANW's price will pull buyers; non-PANW shops (CrowdStrike, Cisco, GCP-first orgs) need an alternative; Cisco's Model Provenance Kit signals open-source momentum.", "CrowdStrike-aligned and GCP-native enterprises; FedRAMP-regulated agencies that cannot adopt PANW SaaS.", "Open-source policy and routing engine + closed-source enterprise plane (audit, IAM, telemetry); deep MCP integration; identity-aware semantic routing.", "Tier-1 risk: PANW + Microsoft + Google bundle gateways into existing security platforms. Differentiation = on-prem/sovereign + multi-LLM equality."], [19, "Autonomous offensive AI for the mid-market", "Armadin (Mandia) and PANW Unit 42 are building autonomous attack swarms for the F500. There is no equivalent for the mid-market: companies that cannot afford Mandiant/CrowdStrike but are now in the blast radius of agentic attackers operating at machine speed.", "Time-to-exploit has shrunk to hours (SecurityWeek 2026-04-30); Anthropic's Mythos demonstrates near-instant exploitation; SMBs are sitting ducks without continuous offensive validation.", "Mid-market SaaS, regional banks, MSP-served verticals (legal, accounting, healthcare clinics).", "Pre-built attack playbooks per vertical; cheap continuous validation as a self-serve product; channel via MSPs and cyber-insurance carriers.", "Channel-led GTM is hard but moats deeply once embedded with insurers (premium discounts for continuous validation)."], [20, "AI model provenance and supply-chain integrity for enterprises", "Cisco open-sourced Model Provenance Kit (MPK) on 2026-05-01; open-weights ecosystem (Reflection, Mistral, Llama, DeepSeek) explodes regulatory and supply-chain risk. Enterprises pulling 100s of models from HF need commercial-grade lineage, watermarking, integrity attestation, and continuous monitoring.", "EU AI Act enforcement begins; SBOM-for-AI mandates emerging; open-source MPK creates the de facto schema; enterprises will pay for SaaS productization with attestation, compliance reporting, and incident response.", "Regulated industries (FinServ, Pharma, Defense), AI platform teams, model marketplaces.", "Ecosystem of model fingerprints + signed attestation + integration with model registries (HF, Databricks, Vertex, SageMaker) + GRC mappings.", "Cisco may bundle a commercial version; Anthropic/OpenAI may ship native attestation. Differentiation = multi-vendor coverage and audit/regulatory mapping."], [21, "Vendor-neutral AI agent skill & tool inspection platform", "As agents proliferate via MCP servers, agent skills, and third-party tools, every enterprise needs to inspect, fingerprint, and gate these capability artifacts before import — and continuously verify them at runtime. SafeSkill-class capability is one slice; the bigger play is a platform spanning MCP, OpenAI Skills, Anthropic Skills, Google Vertex tools, and homegrown agent frameworks.", "ThreatBook launched SafeSkill on 5/7/2026 validating buyer pain. Cisco-Astrix deal (5/4) values agent governance at $400M+. MCP server count exploding 10x QoQ; multiple poisoned-skill / prompt-injection-via-tool incidents in Q1 2026.", "F500 platform-engineering teams piloting agents; AI/ML governance leads in regulated industries; MSSPs.", "Multi-vendor coverage breadth, library of skill fingerprints + adversarial test harness, integrations with agent platforms (Microsoft Agent 365, OpenAI/Anthropic, LangGraph, CrewAI), enterprise GRC mappings.", "ThreatBook's SafeSkill (5/7) is a regional/incumbent move; net-new pure-play startup with broad coverage and modern UX could win. Adjacency to Astrix (NHI for agents): identity + skill-integrity is the agentic security control plane."], [22, "Mid-market IT/OT-converged agentic SOC", "Kai's $125M is aimed at F500 IT/OT convergence (Claroty-class buyer). Mid-market manufacturers, utilities, and healthcare systems run the same OT footprint without budgets for Claroty + Forescout + a SOC vendor. A productized agentic platform that bridges IT and OT for the mid-market — preset playbooks, MSP-delivered, insurance-aligned — can claim the segment Kai will not.", "OT-targeted ransomware up sharply in 2026; cyber-insurance carriers underwriting OT controls; Five Eyes May 2026 joint guidance on agentic AI risk in critical-infra; Kai validates buyer pain at the top.", "Mid-market manufacturers, regional utilities, hospital systems, MSP-served verticals.", "Vertical-specific OT detection content; channel-led GTM via MSPs + cyber insurers; pre-mapped CMMC / NIS2 / IEC 62443 control overlays; bundled IR retainer.", "Risk: Kai expands down-market; Forescout/Claroty open mid-market SKUs. Differentiation: MSP-native delivery + insurer alignment + agentic playbooks for blended IT/OT + bundled GRC."], [23, "Mid-market human-risk security platform delivered via MSPs", "Frame ($50M, 5/11) targets enterprise. Mid-market (healthcare provider groups, RIAs/wealth managers, regional manufacturers) faces the same AI-generated deepfake-CFO, vishing, and BEC attacks but cannot afford an enterprise human-risk stack. Productized, MSP-delivered, role-personalized AI simulation + adaptive training tuned to each vertical.", "Frame validates buyer demand at the enterprise tier. Deepfake-enabled fraud losses crossed $1.56B in 2025; carriers underwriting policies now require human-risk controls; mid-market cyber budgets growing 18-22% YoY in 2026 surveys. MSPs control ~60% of mid-market security spend and lack a turnkey human-risk offering.", "MSPs serving healthcare, RIAs/wealth, regional manufacturers, hospitality, professional services. Cyber-insurance partners as channel.", "Vertical-specific deepfake simulations (e.g., HHS auditor calls, custodian wire instructions, ERP cutover requests); pre-built integrations with Microsoft 365 / Google Workspace / phishing-training stacks; insurer-aligned reporting (binder-ready evidence); MSP RMM integration; pay-per-seat MSP economics.", "Risk: KnowBe4 / Proofpoint launch MSP-friendly SKUs; Frame moves down-market. Differentiation: MSP-native delivery + vertical content libraries + insurer alignment + measurable reductions in deepfake-related claims."], [24, "Vendor-neutral defender-AI agent orchestration platform (\"DefenseGraph\")", "Microsoft MDASH (5/12) orchestrates 100+ AI agents inside Microsoft to find Windows CVEs. AWS open-sourced Rex (5/4), Cisco open-sourced DefenseClaw (RSAC). Enterprises want similar orchestration capability for THEIR custom defenders — but without locking into one cloud or frontier lab. A vendor-neutral framework + skills marketplace for defender agents (vuln triage, IR investigation, threat-intel correlation, detection authoring) spanning Anthropic, OpenAI, Google, open models.", "MDASH proves the architecture: orchestrating specialized agents beats single-shot LLM queries. CISOs want this internally but neither Microsoft, AWS, nor Cisco will ship it cross-cloud + cross-frontier-lab. Verified-defender access tiers from labs (Mythos, GPT-5.5-Cyber, Opus 4.7) create entitlement-management problem this category solves. Cisco-Astrix puts agent identity at $400M valuation; identity + orchestration is the natural control-plane pair.", "F500 SOCs, MSSPs, regulated industries running multi-cloud + multi-frontier-lab, defense primes building autonomous SOC stacks for federal customers.", "Open core + commercial skills marketplace; verified provenance for agent skills (extends Cisco MPK 5/1); pre-mapped to NIST AI RMF + EU AI Act + DoD IL5/6 controls; ecosystem partnerships with Anthropic / OpenAI / Google verified-defender tiers; cross-cloud telemetry collectors.", "Risks: Microsoft Agent 365 / Anthropic Skills bundle native orchestration; open-source projects (Rex, DefenseClaw, LangGraph for security) compress moat. Differentiation: vendor-neutral skill marketplace + verified provenance + GRC mappings + enterprise audit. Adjacent to Idea #21 (skill inspection) and Idea #20 (model provenance) — same team could build both."]]}, "Weekly Log": {"headers": ["Week of (Mon)", "New fundings", "New exits / M&A", "New entrants", "Shutdowns / layoffs", "Themes / trends", "New ideas"], "rows": [["2026-04-20", "Initial build — see Funding Rounds tab", "Initial build — see Exits & M&A tab", "See Companies tab", "n/d", "See Themes tab", "See Startup Ideas tab"], ["2026-04-27", "Spectrum Security $19M seed (4/22); Rilian $17.5M seed+ext (4/23); plus prior week catch-ups: Artemis $70M Series A (4/15), Gitar $9M seed (4/15), Linx Security $50M Series B (3/31).", "Palo Alto Networks closed Koi (~$400M, 4/14) — defines \"Agentic Endpoint Security\"; Google formally closed Wiz $32B (3/26).", "Spectrum Security (detection engineering automation), Rilian (sovereign agentic defense). RSAC 2026 ISB winner Geordie AI + 9 finalists added (Token, Realm Labs, Charm, Clearly AI, Crash Override, Fig, Glide Identity, Humanix, ZeroPath).", "No notable AI+security shutdowns or layoffs this week. Deepwatch (Nov 2025) layoffs remain the most recent material event.", "1) Detection engineering as a wedge (Spectrum) — automating detection authoring upstream, not adding alerts. 2) Sovereign / nation-scale AI defense gaining VC validation (Rilian/UAE). 3) PANW formalizes \"Agentic Endpoint Security\" category — endpoint vendors now race to claim agent-runtime layer. 4) RSAC ISB lineup confirms agentic AI security as #1 theme — 4+ of 10 finalists target agent governance/identity/runtime.", "New idea added (#16): Detection-engineering-as-code platform inspired by Spectrum thesis. New idea added (#17): Sovereign / regulated-market agentic SOC for GCC + EU public sector."], ["2026-05-04", "No major pure AI+security funding rounds tracked in window. Sevii product launch (4/28) is operational, not a financing event.", "PANW announces intent to acquire Portkey (AI Gateway) on 4/30 — defines new control-plane category for agentic AI. PANW + Armadin (Kevin Mandia's new offensive security co) strategic partnership, also 4/30. Catch-up: ServiceNow closed Armis $7.75B on 4/20.", "Sevii Cyber Swarm Defense (CSD) launches 4/28 with token-cost guarantee. Anthropic launches Claude Security public beta 4/30 (Opus 4.7-based vulnerability scanner; CrowdStrike, PANW, SentinelOne, Trend Micro, Wiz integrating). Cisco open-sources Model Provenance Kit 5/1.", "No notable AI+security pure-play shutdowns this week. Anthropic explicitly excluded from Pentagon IL6/IL7 list (5/1) over usage-policy disagreement — not a startup failure but a notable commercial signal.", "1) AI Gateway / agentic control plane formalized as a category by PANW-Portkey. 2) Frontier AI labs now central to cyber policy: OpenAI/Anthropic briefed Congress (4/29) on Mythos / GPT-5.4-Cyber capabilities. 3) Pentagon clears 8 firms (AWS/Google/MS/OpenAI/SpaceX/NVIDIA/Reflection/Oracle) for IL6/IL7 — Anthropic notably absent. 4) Time-to-exploit collapsed to hours; vendors (Anthropic, Sevii, Cisco) shipping defender-side counter-tools the same week. 5) BCG (4/29) frames the gap as \"synchronization\": speed of AI vs. governance.", "New idea added (#18): Vendor-neutral AI Gateway / agent control plane (open alternative to PANW-Portkey). New idea added (#19): Autonomous offensive AI for the mid-market (Armadin-class capability for SMB/MSP channel). New idea added (#20): AI model provenance / supply-chain integrity SaaS (productize Cisco MPK)."], ["2026-05-08 (run 2)", "No new pure AI+security funding rounds tracked in this 5/4–5/8 window beyond what was logged 5/4. Cybersecurity venture market saw funding concentrated in space security (True Anomaly $600M Series D) and consumer privacy (Cape $100M Series C, $900M val) — both adjacent but not pure AI+cyber.", "Cisco announces intent to acquire Astrix Security (~$400M, 2026-05-04) — non-human identity / AI agent security. NextPoint Group → UScontracting (5/7, govcon SIGINT/cyber, terms n/d).", "Microsoft Agent 365 GA on 5/1/2026 — IT/security control plane for AI agents (Entra ID per agent, Defender runtime governance, Intune extension; bundled in M365 E7 Frontier Suite at $15/user/mo). Netskope launches AgentSkope (5/6/2026) — agentic SOC/NOC automation. ThreatBook launches Flocks (AI-native SecOps) and SafeSkill (agent skill inspection) on 5/7/2026.", "No notable AI+security pure-play shutdowns or layoffs this week. Broader Q1 2026 tech layoffs continue (78K+ cumulative across industry per CNBC / Toms Hardware), but AI-security category remains a protected investment area at incumbents (Oracle explicitly carved out security from its 30K cuts).", "1) Non-human identity / agentic IAM officially the marquee category — Cisco-Astrix $400M intent validates Astrix-class plays at strategic-acquirer prices and signals NHI is now a must-have for platform vendors. 2) Agent control planes go GA — Microsoft Agent 365 GA on 5/1 turns \"secure the agentic workforce\" pitch into a productized SKU; expect SaaS-IDP-style consolidation around it. 3) Agent skill / tool integrity emerges as a distinct sub-category — ThreatBook SafeSkill points at MCP/skill marketplaces as the next supply-chain frontier. 4) Agentic SOC race continues to incumbents — Netskope, Arctic Wolf, Microsoft, ThreatBook all shipping agent-fleets for SOC; runway shrinks for pure-play AI-SOC startups absent unique data or distribution moat. 5) Fewer mega-rounds in pure AI+cyber this week vs. prior weeks (RSAC and Q1 cluster ~$3.6B); rotation toward space security and AI privacy.", "New idea added (#21): Vendor-neutral AI agent skill & tool inspection platform — capitalize on MCP/skill marketplace explosion + ThreatBook SafeSkill validation; expand on Astrix/Capsule adjacency."], ["2026-05-18", "", "", "", "", "", ""], ["2026-05-25", "", "", "", "", "", ""], ["2026-06-01", "", "", "", "", "", ""], ["2026-06-08", "", "", "", "", "", ""], ["2026-06-15", "", "", "", "", "", ""], ["2026-06-22", "", "", "", "", "", ""], ["2026-06-29", "", "", "", "", ""   }).render(document.getElementById(elId));

const ideas = DATA["Startup Ideas"];
if (ideas) ideas.rows.forEach(r => {
  const c = document.createElement("div"); c.className = "idea-card";
  c.innerHTML = `<h3>#${escapeHtml(r[0])} — ${escapeHtml(r[1])}</h3><p><span class="label">Wedge:</span> ${escapeHtml(r[2])}</p><p><span class="label">Why now:</span> ${escapeHtml(r[3])}</p><p><span class="label">Early customers:</span> ${escapeHtml(r[4])}</p><p><span class="label">Moat:</span> ${escapeHtml(r[5])}</p>${r[6] ? `<p class="meta">${escapeHtml(r[6])}</p>` : ""}`;
  document.getElementById("panel-ideas").appendChild(c);
});
const weekly = DATA["Weekly Log"];
if (weekly) [...weekly.rows].reverse().forEach(r => {
  const c = document.createElement("div"); c.className = "weekly-card";
  c.innerHTML = `<div class="week">Week of ${escapeHtml(r[0])}</div><h3>Summary</h3><div class="row"><span class="label">New fundings</span> ${escapeHtml(r[1])}</div><div class="row"><span class="label">Exits / M&amp;A</span> ${escapeHtml(r[2])}</div><div class="row"><span class="label">New entrants</span> ${escapeHtml(r[3])}</div><div class="row"><span class="label">Shutdowns</span> ${escapeHtml(r[4])}</div><div class="row"><span class="label">Themes / trends</span> ${escapeHtml(r[5])}</div><div class="row"><span class="label">New ideas</span> ${escapeHtml(r[6])}</div>`;
  document.getElementById("panel-weekly").appendChild(c);
});
const COLORS = ["#b45309","#0e7490","#65a30d","#7c3aed","#db2777","#dc2626","#0891b2","#a16207","#4d7c0f","#be185d","#1d4ed8","#9333ea"];
function countBy(rows, idx) { const m = {}; rows.forEach(r => { const v = (r[idx] || "n/d").toString().trim() || "n/d"; m[v] = (m[v] || 0) + 1; }); return Object.entries(m).sort((a,b) => b[1] - a[1]); }
const cos = DATA["Companies"];
if (cos) {
  const h = cos.headers; const cI = h.indexOf("Category"); const sI = h.indexOf("Stage");
  const cats = countBy(cos.rows, cI); const stages = countBy(cos.rows, sI);
  new Chart(document.getElementById("catChart"), { type: "bar", data: { labels: cats.map(c => c[0]), datasets: [{ data: cats.map(c => c[1]), backgroundColor: COLORS, borderRadius: 4 }] }, options: { indexAxis: "y", maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: "#f5f5f4" } }, y: { grid: { display: false }, ticks: { font: { size: 11 } } } } } });
  new Chart(document.getElementById("stageChart"), { type: "doughnut", data: { labels: stages.map(s => s[0]), datasets: [{ data: stages.map(s => s[1]), backgroundColor: COLORS }] }, options: { maintainAspectRatio: false, plugins: { legend: { position: "right", labels: { font: { size: 11 }, boxWidth: 12 } } } } });
}
</script>
